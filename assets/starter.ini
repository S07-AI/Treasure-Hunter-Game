# Treasure Runner Generator Config

# Seed for deterministic generation
seed=15

[world]
num_rooms=3

[room]
width=20
height=15
width_variance=2
height_variance=2

[portals]
portals_per_room=3
portals_variance=1
portal_placement=walls
connectivity_chance=30

[treasures]
treasures_per_room=3
treasures_variance=0

[pushables]
pushables_per_room=2
pushables_variance=1

[switches]
enabled=true

[charset]
wall=#
floor=.
player=@
treasure=$
portal=X
pushable=O
switch_off=^
switch_on=+